name: Run Aarav Bot (Stable)

on:
  workflow_dispatch:   # manual start only (duplicate se bachne ke liye)

concurrency:
  group: aarav-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # GitHub limit ke andar max time

    steps:
      - name: 📥 Repo Clone
        uses: actions/checkout@v4

      - name: 🟢 Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🔁 Start Bot (Auto Restart Loop)
        run: |
          echo "Starting AaravBot..."
          while true
          do
            node index.js
            echo "Bot stopped. Restarting in 5 seconds..."
            sleep 5
          done
