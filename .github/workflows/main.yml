name: Run Facebook Bot

on:
  schedule:
    - cron: "*/30 * * * *"   # Har 30 minute me run hoga
  workflow_dispatch:         # Manual run button bhi milega

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo clone karo
        uses: actions/checkout@v3

      - name: Node.js install karo
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Dependencies install karo
        run: npm install

      - name: Bot run karo
        run: node bot.js
