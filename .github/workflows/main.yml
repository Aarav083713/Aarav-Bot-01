name: Run FB Bot

on:
  schedule:
    - cron: "*/30 * * * *"   # Har 30 min me auto run
  workflow_dispatch:         # Manual run button

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run bot
        run: node bot.js
