name: FB Bot 6H Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # Har 6 ghante me auto run

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 ghante max

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm install || true   # error me bhi aage badhe

      - name: Start Bot (6 hours)
        run: |
          echo "Aarav Shorts FB bot start ✅"
          node bot.js &
          sleep 21600               # 6 ghante (21600 sec)
